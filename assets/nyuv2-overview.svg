<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260">
  <rect width="900" height="260" fill="#f6f7fb"/>
  <text x="40" y="45" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#1d3557">NYUv2 Semantic Segmentation</text>
  <text x="40" y="78" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#4a5568">RGB + depth を使った室内シーンのセグメンテーション公開版フロー</text>
  <rect x="40" y="110" width="180" height="90" rx="14" fill="#dbeafe"/>
  <text x="70" y="150" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#1e3a8a">Input</text>
  <text x="62" y="178" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#1e3a8a">RGB image + depth map</text>
  <rect x="260" y="110" width="180" height="90" rx="14" fill="#dcfce7"/>
  <text x="316" y="150" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#166534">Model</text>
  <text x="293" y="178" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#166534">Dual encoder + decoder</text>
  <rect x="480" y="110" width="180" height="90" rx="14" fill="#fef3c7"/>
  <text x="541" y="150" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#92400e">Metric</text>
  <text x="546" y="178" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#92400e">mIoU</text>
  <rect x="700" y="110" width="160" height="90" rx="14" fill="#fee2e2"/>
  <text x="743" y="150" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#991b1b">Output</text>
  <text x="718" y="178" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#991b1b">mask + qualitative review</text>
  <path d="M220 155 H260" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M440 155 H480" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M660 155 H700" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
