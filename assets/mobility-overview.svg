<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260">
  <rect width="900" height="260" fill="#f8fafc"/>
  <text x="40" y="45" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#1f2937">Mobility Demand Forecasting</text>
  <text x="40" y="78" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#4b5563">移動需要データに対して、ラグ特徴量と外部要因を使って日次・時間帯需要を予測</text>
  <rect x="40" y="110" width="180" height="90" rx="14" fill="#dbeafe"/>
  <text x="101" y="148" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#1e3a8a">Input</text>
  <text x="72" y="176" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#1e3a8a">demand + weather + calendar</text>
  <rect x="260" y="110" width="180" height="90" rx="14" fill="#dcfce7"/>
  <text x="303" y="148" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#166534">Feature</text>
  <text x="282" y="176" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#166534">lag / rolling / weekday</text>
  <rect x="480" y="110" width="180" height="90" rx="14" fill="#fef3c7"/>
  <text x="527" y="148" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#92400e">Model</text>
  <text x="522" y="176" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#92400e">LightGBM baseline</text>
  <rect x="700" y="110" width="160" height="90" rx="14" fill="#fee2e2"/>
  <text x="745" y="148" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#991b1b">Metric</text>
  <text x="734" y="176" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#991b1b">MAE / RMSE</text>
  <path d="M220 155 H260" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M440 155 H480" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M660 155 H700" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
